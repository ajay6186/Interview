# ============================================================================
# Solution 5.3 — Nginx Reverse Proxy
# ============================================================================

version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro   # :ro = read-only mount
    depends_on:
      - app

  app:
    image: node:18-alpine
    command: >
      sh -c "node -e \"
        const h=require('http');
        h.createServer((req,res)=>{
          res.end('Hello from Node.js app! X-Real-IP: '+req.headers['x-real-ip']+'\n');
        }).listen(3000);
        console.log('App on port 3000');
      \""
    # No ports exposed to host — only reachable via Nginx
