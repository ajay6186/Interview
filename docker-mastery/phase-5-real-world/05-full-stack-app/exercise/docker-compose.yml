# ============================================================================
# Exercise 5.5 — Full Stack Application
# Bring together: Nginx + Node.js + PostgreSQL + Redis
# ============================================================================

version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    # TODO: Attach to the "frontend" network only
    # networks:
    #   - frontend

  api:
    build: ./api
    environment:
      DATABASE_URL: postgres://user:pass@db:5432/appdb
      REDIS_URL: redis://redis:6379
      PORT: 3000
    depends_on:
      - db
      - redis
    # TODO: Attach to BOTH frontend and backend networks
    # (nginx needs to reach api, and api needs to reach db/redis)
    # networks:
    #   - frontend
    #   - backend

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    # TODO: Attach to "backend" network only (not reachable from nginx)
    # networks:
    #   - backend

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    # TODO: Attach to "backend" network only
    # networks:
    #   - backend

# TODO: Declare the two networks
# networks:
#   frontend:
#   backend:

volumes:
  pg_data:
  redis_data:
