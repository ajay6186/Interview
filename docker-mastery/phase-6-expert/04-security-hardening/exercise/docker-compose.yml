version: "3.9"

services:
  app:
    image: node:18-alpine
    command: >
      sh -c "node -e \"
        require('http').createServer((req,res)=>{
          res.end('Secure app running!\\n');
        }).listen(3000);
        console.log('App started on port 3000');
      \""
    ports:
      - "3000:3000"
    user: "nobody"

    # TODO: Make the container filesystem read-only
    # read_only: true

    # TODO: Add a tmpfs mount so the app can still write temp files
    # tmpfs:
    #   - /tmp

    # TODO: Drop ALL Linux capabilities
    # cap_drop:
    #   - ALL

    # TODO: Prevent privilege escalation (setuid/setgid binaries)
    # security_opt:
    #   - no-new-privileges:true
