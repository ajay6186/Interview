# ============================================================================
# Exercise 4.4 — Blue/Green Deployment
# ============================================================================

version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    # TODO: Mount nginx.conf
    # volumes:
    #   - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - blue
      - green

  blue:
    image: node:18-alpine
    command: sh -c "node -e \"require('http').createServer((_,r)=>r.end('Blue version\\n')).listen(3000)\""

  green:
    image: node:18-alpine
    command: sh -c "node -e \"require('http').createServer((_,r)=>r.end('Green version\\n')).listen(3000)\""
