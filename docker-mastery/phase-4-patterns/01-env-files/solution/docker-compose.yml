# ============================================================================
# Solution 4.1 — Environment Files
# ============================================================================

version: "3.9"

services:
  web:
    image: node:18-alpine
    command: sh -c "echo Port: $APP_PORT && while true; do sleep 1; done"
    env_file:
      - .env            # Loads APP_PORT, NODE_ENV

  db:
    image: postgres:15-alpine
    env_file:
      - .env.db         # Loads POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
    ports:
      - "5432:5432"
