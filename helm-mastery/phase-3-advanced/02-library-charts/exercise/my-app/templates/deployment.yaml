apiVersion: apps/v1
kind: Deployment
metadata:
  {{- /* TODO: Use my-library.fullname helper */}}
  name: {{ include "???" . }}
  labels:
    {{- /* TODO: Use my-library.labels helper */}}
    {{- include "???" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
    spec:
      containers:
        - name: app
          image: nginx:alpine
