{{- $secretName := printf "%s-app-secret" .Release.Name }}
{{- $namespace := .Release.Namespace }}

{{- $existing := lookup "v1" "Secret" $namespace $secretName }}

{{- if not $existing }}
{{- /* Secret doesn't exist yet — create it with a random password */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
type: Opaque
stringData:
  password: {{ randAlphaNum 32 | quote }}
  created-at: {{ now | date "2006-01-02" | quote }}
{{- end }}

{{- /* If secret exists, this template renders nothing — secret is preserved */}}

{{- /* IMPORTANT: lookup returns {} (empty dict) when:
       1. Resource doesn't exist
       2. Running helm template (no cluster connection)
     An empty dict is falsy, so "if not {}" is true → secret gets created
     This is correct behavior for helm template (always renders the secret)
*/}}
