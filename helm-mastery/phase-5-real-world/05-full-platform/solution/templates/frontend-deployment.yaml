{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-frontend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "platform.image" (dict "registry" .Values.global.imageRegistry "repo" .Values.frontend.image.repository "tag" .Values.frontend.image.tag) }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
          env:
            - name: ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            - name: API_URL
              value: "http://{{ .Release.Name }}-backend:{{ .Values.backend.service.port }}"
{{- end }}
