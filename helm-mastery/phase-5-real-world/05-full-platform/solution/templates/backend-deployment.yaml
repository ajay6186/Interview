{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
    spec:
      containers:
        - name: backend
          image: {{ include "platform.image" (dict "registry" .Values.global.imageRegistry "repo" .Values.backend.image.repository "tag" .Values.backend.image.tag) }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.backend.config.logLevel | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secrets.dbSecretName }}
                  key: db-password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.database.auth.username }}:$(DB_PASSWORD)@{{ .Release.Name }}-postgresql:5432/{{ .Values.database.auth.database }}"
{{- end }}
