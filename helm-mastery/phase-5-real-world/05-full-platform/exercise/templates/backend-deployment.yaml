{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
    spec:
      containers:
        - name: backend
          image: {{ include "platform.image" (dict "registry" .Values.global.imageRegistry "repo" .Values.backend.image.repository "tag" .Values.backend.image.tag) }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.backend.config.logLevel | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secrets.dbSecretName }}
                  key: db-password
            - name: DATABASE_URL
              # TODO: Build the DATABASE_URL pointing to the in-cluster postgres service
              # Pattern: postgresql://<user>:<password-env-var>@<release-name>-postgresql:<port>/<db>
              # Hint: Use $(DB_PASSWORD) to reference the env var above
              value: ???
{{- end }}
