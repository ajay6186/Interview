---
# Headless service for stable pod DNS names
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgresql-headless
spec:
  # TODO: Set clusterIP to None to make it headless
  clusterIP: ???
  ports:
    - port: {{ .Values.service.port }}
      targetPort: postgresql
      name: postgresql
  selector:
    app: {{ .Release.Name }}-postgresql
---
# Regular service for external access
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgresql
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: postgresql
      name: postgresql
  selector:
    app: {{ .Release.Name }}-postgresql
