image:
  repository: postgres
  tag: "15-alpine"
  pullPolicy: IfNotPresent

auth:
  postgresPassword: ""
  database: "mydb"
  username: "myuser"
  password: ""

storage:
  size: "1Gi"
  storageClass: ""

service:
  port: 5432

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"
