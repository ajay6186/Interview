---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgresql-headless
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: postgresql
      name: postgresql
  selector:
    app: {{ .Release.Name }}-postgresql
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgresql
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: postgresql
      name: postgresql
  selector:
    app: {{ .Release.Name }}-postgresql
