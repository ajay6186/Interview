apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-connection
  annotations:
    "helm.sh/hook": test       # Pod runs when "helm test RELEASE" is called
spec:
  restartPolicy: Never          # Must be Never for test pods
  containers:
    - name: test
      image: busybox
      command:
        - sh
        - -c
        - |
          echo "Testing connection to {{ .Release.Name }}-svc:80 ..."
          wget -qO- http://{{ .Release.Name }}-svc:80
          echo "Connection test passed!"
          # wget returns non-zero on failure — test automatically fails
