repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami

releases:
  - name: frontend
    namespace: default
    chart: ./charts/frontend
    values:
      - values/frontend.yaml

  - name: backend
    namespace: default
    chart: ./charts/backend
    values:
      - values/backend.yaml
    needs:
      - frontend

  - name: database
    namespace: default
    chart: bitnami/postgresql
    version: "13.0.0"
    set:
      - name: auth.postgresPassword
        value: mysecretpassword
