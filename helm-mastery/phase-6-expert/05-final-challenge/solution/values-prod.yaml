replicaCount: 3

image:
  pullPolicy: IfNotPresent

config:
  logLevel: "warn"
  environment: "production"

ingress:
  enabled: true
  host: myapp.example.com
  tls:
    enabled: true

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 20

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "2000m"
    memory: "1Gi"

migration:
  enabled: true
