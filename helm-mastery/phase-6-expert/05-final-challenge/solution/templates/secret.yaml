{{- $secretName := printf "%s-generated-secret" (include "app.fullname" .) }}
{{- $namespace := .Release.Namespace }}

{{- $existing := lookup "v1" "Secret" $namespace $secretName }}

{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  app-key: {{ randAlphaNum 32 | quote }}
  created-at: {{ now | date "2006-01-02" | quote }}
{{- end }}
