apiVersion: v1
kind: Pod
metadata:
  name: {{ include "app.fullname" . }}-test-connection
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: curlimages/curl:latest
      args:
        - "-f"
        - "http://{{ include "app.fullname" . }}:{{ .Values.service.port }}/healthz"
