apiVersion: v1
kind: Pod
metadata:
  name: {{ include "app.fullname" . }}-test-connection
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    # TODO: Mark this pod as a Helm test hook
    helm.sh/hook: ???
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: curlimages/curl:latest
      args:
        - "-f"
        # TODO: Test the service endpoint — curl the service name + port + health path
        - "http://{{ include "app.fullname" . }}:{{ .Values.service.port }}/healthz"
