{{- $secretName := printf "%s-generated-secret" (include "app.fullname" .) }}
{{- $namespace := .Release.Namespace }}

{{- $existing := lookup "v1" "Secret" $namespace $secretName }}

{{- if not $existing }}
# TODO: Only render this Secret if it doesn't already exist (use lookup result above)
# This preserves the secret across upgrades
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  # TODO: Generate a random 32-char alphanumeric app-key
  app-key: ???
  created-at: {{ now | date "2006-01-02" | quote }}
{{- end }}
