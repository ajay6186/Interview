<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Mastery</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
      #root { max-width: 900px; margin: 0 auto; padding: 2rem; }
      h1, h2, h3 { color: #61dafb; }
      button { padding: 0.5rem 1rem; border: none; border-radius: 6px; background: #61dafb; color: #1a1a2e; font-weight: 600; cursor: pointer; }
      button:hover { background: #4fc3f7; }
      input, textarea, select { padding: 0.5rem; border: 1px solid #444; border-radius: 4px; background: #16213e; color: #eee; }
      .error { color: #ff6b6b; }
      .success { color: #51cf66; }
      .card { background: #16213e; border-radius: 8px; padding: 1.5rem; margin: 1rem 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
