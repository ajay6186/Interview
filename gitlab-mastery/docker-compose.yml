services:
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    hostname: gitlab.local
    restart: unless-stopped
    ports:
      - "8929:8929"     # GitLab web UI  → http://localhost:8929
      - "2289:22"       # SSH git clone  → ssh://git@localhost:2289
      - "5050:5050"     # Container Registry
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab.local:8929'
        gitlab_rails['gitlab_shell_ssh_port'] = 2289
        registry_external_url 'http://gitlab.local:5050'
        gitlab_rails['registry_enabled'] = true
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 5
        postgresql['shared_buffers'] = "128MB"
        prometheus_monitoring['enable'] = false
    shm_size: '256m'
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "60", "http://localhost/-/health"]
      interval: 60s
      timeout: 65s
      retries: 10
      start_period: 5m
    networks:
      - gitlab-net

  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    container_name: gitlab-runner
    restart: unless-stopped
    depends_on:
      - gitlab
    volumes:
      - gitlab_runner_config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gitlab-net

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  gitlab_runner_config:

networks:
  gitlab-net:
    driver: bridge
