# Phase 5.1 — REAL WORLD Node.js CI/CD Pipeline
# This is what a production pipeline looks like.
# Copy this file to the root of a GitLab project to use it.

stages:
  - install       # Install dependencies (cached)
  - quality       # Lint, typecheck (fast feedback)
  - test          # Unit tests with coverage
  - build         # Build Docker image
  - scan          # Security scan
  - deploy        # Deploy to environments

# ── GLOBAL VARIABLES ─────────────────────────────────────────
variables:
  NODE_VERSION: "18"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"
  DOCKER_TLS_CERTDIR: ""

# ── GLOBAL CACHE (inherited by all jobs) ─────────────────────
cache:
  key: "node-$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/
  policy: pull    # Jobs only download cache by default

# ── INSTALL ──────────────────────────────────────────────────
install:
  stage: install
  image: node:18-alpine
  script:
    - node --version
    - npm --version
    - npm ci
  cache:
    key: "node-$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
    policy: pull-push    # This job updates the cache

# ── QUALITY ──────────────────────────────────────────────────
lint:
  stage: quality
  image: node:18-alpine
  needs: ["install"]
  script:
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── TESTS ────────────────────────────────────────────────────
unit-test:
  stage: test
  image: node:18-alpine
  needs: ["install"]
  script:
    - npm run test:ci
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 7 days

# ── BUILD DOCKER IMAGE ────────────────────────────────────────
build-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
  needs: ["unit-test"]
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build
        --build-arg APP_VERSION=$CI_COMMIT_SHORT_SHA
        --tag "$IMAGE_TAG"
        --tag "$IMAGE_LATEST"
        .
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_LATEST"
    - echo "Image pushed: $IMAGE_TAG"
  after_script:
    - docker logout "$CI_REGISTRY"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ── SECURITY SCAN ─────────────────────────────────────────────
security-scan:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs: ["build-image"]
  variables:
    GIT_STRATEGY: none
  script:
    - trivy image --severity HIGH,CRITICAL --exit-code 0 "$IMAGE_TAG"
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── DEPLOY TO STAGING ─────────────────────────────────────────
deploy-staging:
  stage: deploy
  image: alpine:latest
  needs: ["build-image"]
  variables:
    GIT_STRATEGY: none
  environment:
    name: staging
    url: http://staging.my-app.com
  script:
    - echo "Deploying $IMAGE_TAG to staging..."
    - echo "docker pull $IMAGE_TAG"
    - echo "docker stop app-staging || true"
    - echo "docker run -d --name app-staging -p 3000:3000 -e NODE_ENV=staging $IMAGE_TAG"
    - echo "Deployed to staging ✓"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── DEPLOY TO PRODUCTION ──────────────────────────────────────
deploy-production:
  stage: deploy
  image: alpine:latest
  needs: ["deploy-staging", "security-scan"]
  variables:
    GIT_STRATEGY: none
  environment:
    name: production
    url: http://my-app.com
  script:
    - echo "=== PRODUCTION DEPLOYMENT ==="
    - echo "Image: $IMAGE_TAG"
    - echo "Deploying..."
    - echo "docker pull $IMAGE_TAG"
    - echo "docker stop app-prod || true"
    - echo "docker run -d --name app-prod -p 80:3000 -e NODE_ENV=production $IMAGE_TAG"
    - echo "Production deployment complete ✓"
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── RELEASE BUILD (on git tags) ───────────────────────────────
release:
  stage: build
  image: alpine:latest
  script:
    - echo "Creating release $CI_COMMIT_TAG"
    - echo "Tag: $CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/   # matches v1.2.3
