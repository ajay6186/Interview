# Phase 2.6 — Reusable Pipelines (includes, extends, templates)
# Industry pattern: never repeat yourself in CI/CD
# Split large pipelines into small reusable files

# ── INCLUDE OTHER FILES ──────────────────────────────────────
# In a real project you would split into separate files:
#
# .gitlab/ci/
# ├── build.yml
# ├── test.yml
# ├── deploy.yml
# └── security.yml
#
# Then in .gitlab-ci.yml:
# include:
#   - local: '.gitlab/ci/build.yml'
#   - local: '.gitlab/ci/test.yml'
#   - local: '.gitlab/ci/deploy.yml'
#   - local: '.gitlab/ci/security.yml'
#   # Include GitLab's official templates:
#   - template: 'Security/SAST.gitlab-ci.yml'
#   # Include from another project:
#   - project: 'my-group/shared-ci'
#     ref: main
#     file: '/templates/node.yml'

# ── HIDDEN JOBS (templates with dot prefix) ──────────────────
# Jobs starting with . are hidden — they never run directly.
# Use them as base templates with "extends:"

.base-job:
  image: alpine:latest
  before_script:
    - echo "=== Job starting: $CI_JOB_NAME ==="
    - echo "Branch: $CI_COMMIT_BRANCH"
    - echo "Pipeline: $CI_PIPELINE_ID"
  after_script:
    - echo "=== Job finished: $CI_JOB_NAME ==="

.node-job:
  image: node:18-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG-node"
    paths:
      - node_modules/
  before_script:
    - node --version
    - npm --version

.deploy-template:
  image: alpine:latest
  before_script:
    - echo "Preparing deployment to $DEPLOY_ENV"
    - apk add --no-cache curl
  script:
    - echo "Deploying to $DEPLOY_ENV..."
    - echo "Image: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - curl -sf http://health.example.com || echo "Health check skipped"
    - echo "Deployment complete ✓"
  after_script:
    - echo "Notifying team about $DEPLOY_ENV deployment"

# ── STAGES ───────────────────────────────────────────────────

stages:
  - build
  - test
  - deploy

# ── JOBS USING extends: ──────────────────────────────────────

build-app:
  extends: .base-job       # Inherit from template
  stage: build
  script:
    - echo "Building..."
    - mkdir -p dist && echo "built" > dist/app.txt
  artifacts:
    paths: [dist/]

unit-test:
  extends: .base-job
  stage: test
  script:
    - echo "Running unit tests..."
    - echo "PASS: 24 tests"

integration-test:
  extends: .base-job
  stage: test
  script:
    - echo "Running integration tests..."
    - echo "PASS: 8 tests"
  # Override the image from .base-job
  image: ubuntu:22.04

deploy-staging:
  extends: .deploy-template  # Inherit script, before_script, after_script
  stage: deploy
  variables:
    DEPLOY_ENV: "staging"    # Passed into the template's script
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy-production:
  extends: .deploy-template
  stage: deploy
  variables:
    DEPLOY_ENV: "production"
  environment:
    name: production
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── ANCHORS (YAML feature — another way to reuse) ────────────
# YAML anchors are less powerful than extends but work for simple cases

.default_rules: &default_rules
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

notify-slack:
  stage: deploy
  image: alpine:latest
  <<: *default_rules          # Paste the YAML anchor here
  script:
    - echo "Sending Slack notification..."
    - echo "Would call: curl -X POST $SLACK_WEBHOOK_URL ..."
  when: on_success
