# Phase 2.4 — Variables & Secrets
# Where to set variables:
#   1. In this file (visible to everyone — NOT for secrets)
#   2. Project → Settings → CI/CD → Variables (masked/protected)
#   3. Group → Settings → CI/CD → Variables (shared across projects)

stages:
  - validate
  - deploy

# ── FILE-LEVEL VARIABLES (not secret) ───────────────────────
variables:
  APP_NAME: "my-app"
  APP_VERSION: "1.0.0"
  NODE_ENV: "production"
  DOCKER_DRIVER: overlay2

# ── HOW TO USE SECRET VARIABLES ─────────────────────────────
# In GitLab UI: Project → Settings → CI/CD → Variables
# Add these (mask the values):
#   DB_PASSWORD   = your-db-password        (Masked: yes, Protected: yes)
#   API_KEY       = your-api-key            (Masked: yes, Protected: yes)
#   SSH_PRIVATE_KEY = -----BEGIN OPENSSH...  (File type variable)

validate-config:
  stage: validate
  image: alpine:latest
  script:
    - echo "App: $APP_NAME v$APP_VERSION"
    - echo "Environment: $NODE_ENV"
    # Check required secret is set (will fail if not defined in UI)
    - |
      if [ -z "$DB_PASSWORD" ]; then
        echo "ERROR: DB_PASSWORD not set in CI/CD variables"
        exit 1
      fi
    - echo "All required variables are set ✓"
  variables:
    # Override global variable for this job only
    NODE_ENV: "staging"

deploy-with-env:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying $APP_NAME to $ENVIRONMENT"
    # Secret variables are masked in logs (shows [MASKED])
    - echo "Connecting with key: $API_KEY"
  environment:
    name: $ENVIRONMENT
  parallel:
    matrix:
      - ENVIRONMENT: staging
        REGION: us-east-1
      - ENVIRONMENT: eu-staging
        REGION: eu-west-1

# ── DOTENV ARTIFACT — pass dynamic values between jobs ───────
generate-version:
  stage: validate
  image: alpine:latest
  script:
    - |
      echo "BUILD_VERSION=1.0.$CI_PIPELINE_IID" >> build.env
      echo "BUILD_DATE=$(date +%Y%m%d)" >> build.env
  artifacts:
    reports:
      dotenv: build.env    # Variables in this file are available in downstream jobs

use-generated-version:
  stage: deploy
  image: alpine:latest
  needs:
    - job: generate-version
      artifacts: true
  script:
    - echo "Deploying version: $BUILD_VERSION built on $BUILD_DATE"
