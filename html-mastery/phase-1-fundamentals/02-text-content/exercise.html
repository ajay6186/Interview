<hr>
<div id="results"><h2 style="font-family:sans-serif">Exercise 1.2 — Results</h2></div>
<script>
  const _r = document.getElementById("results");
  let _p = 0, _f = 0;
  function assert(cond, msg) {
    const el = document.createElement("p");
    el.style.cssText = "margin:4px 0;font-family:monospace;font-size:14px";
    if (cond) { el.style.color = "green"; el.textContent = "✓ " + msg; _p++; }
    else       { el.style.color = "red";   el.textContent = "✗ FAIL: " + msg; _f++; }
    _r.appendChild(el);
  }

  // 1. h1 exists
  assert(document.querySelector("h1") !== null, "<h1> element exists on the page");

  // 2. h2 exists
  assert(document.querySelector("h2") !== null, "<h2> element exists on the page");

  // 3. h3 exists
  assert(document.querySelector("h3") !== null, "<h3> element exists on the page");

  // 4. p element exists
  assert(document.querySelector("p") !== null, "<p> element exists on the page");

  // 5. strong exists inside a paragraph
  assert(document.querySelector("p strong") !== null, "<strong> element exists inside a <p>");

  // 6. em exists
  assert(document.querySelector("em") !== null, "<em> element exists on the page");

  // 7. abbr with title attribute exists
  const abbrEl = document.querySelector("abbr[title]");
  assert(abbrEl !== null, "<abbr> element with title attribute exists");

  // 8. blockquote with cite attribute exists
  const bq = document.querySelector("blockquote[cite]");
  assert(bq !== null, "<blockquote> with cite attribute exists");

  // 9. code element exists
  assert(document.querySelector("code") !== null, "<code> element exists on the page");

  // 10. del and ins elements exist
  assert(document.querySelector("del") !== null && document.querySelector("ins") !== null,
    "<del> and <ins> elements both exist");

  // 11. mark element exists
  assert(document.querySelector("mark") !== null, "<mark> element exists on the page");

  // 12. pre element exists
  assert(document.querySelector("pre") !== null, "<pre> element exists on the page");

  // Summary
  const _s = document.createElement("p");
  _s.style.cssText = "margin-top:12px;font-weight:bold;font-family:sans-serif";
  _s.style.color = _f === 0 ? "green" : "red";
  _s.textContent = _f === 0
    ? `Exercise 1.2 — All ${_p} assertions passed!`
    : `${_f} assertion(s) failed, ${_p} passed.`;
  _r.appendChild(_s);
</script>
