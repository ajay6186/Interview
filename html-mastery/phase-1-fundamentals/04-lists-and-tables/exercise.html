<hr>
<div id="results"><h2 style="font-family:sans-serif">Exercise 1.4 — Results</h2></div>
<script>
  const _r = document.getElementById("results");
  let _p = 0, _f = 0;
  function assert(cond, msg) {
    const el = document.createElement("p");
    el.style.cssText = "margin:4px 0;font-family:monospace;font-size:14px";
    if (cond) { el.style.color = "green"; el.textContent = "✓ " + msg; _p++; }
    else       { el.style.color = "red";   el.textContent = "✗ FAIL: " + msg; _f++; }
    _r.appendChild(el);
  }

  // 1. ul exists with at least 3 li items
  const ulEl = document.querySelector("ul");
  assert(ulEl !== null && ulEl.querySelectorAll("li").length >= 3, "<ul> with at least 3 <li> items exists");

  // 2. ol exists with at least 3 li items
  const olEl = document.querySelector("ol");
  assert(olEl !== null && olEl.querySelectorAll("li").length >= 3, "<ol> with at least 3 <li> items exists");

  // 3. dl exists with at least one dt and dd
  const dlEl = document.querySelector("dl");
  assert(dlEl !== null, "<dl> element exists");
  assert(dlEl !== null && dlEl.querySelector("dt") !== null, "<dt> exists inside <dl>");
  assert(dlEl !== null && dlEl.querySelector("dd") !== null, "<dd> exists inside <dl>");

  // 4. table with thead exists
  const tableEl = document.querySelector("table");
  assert(tableEl !== null, "<table> element exists");
  assert(document.querySelector("thead") !== null, "<thead> element exists inside a table");

  // 5. tbody exists
  assert(document.querySelector("tbody") !== null, "<tbody> element exists inside a table");

  // 6. tfoot exists
  assert(document.querySelector("tfoot") !== null, "<tfoot> element exists inside a table");

  // 7. caption exists
  assert(document.querySelector("caption") !== null, "<caption> element exists inside a table");

  // 8. th with scope="col" exists
  const colTh = document.querySelector('th[scope="col"]');
  assert(colTh !== null, '<th scope="col"> exists in the table');

  // 9. th with scope="row" exists
  const rowTh = document.querySelector('th[scope="row"]');
  assert(rowTh !== null, '<th scope="row"> exists in the table');

  // Summary
  const _s = document.createElement("p");
  _s.style.cssText = "margin-top:12px;font-weight:bold;font-family:sans-serif";
  _s.style.color = _f === 0 ? "green" : "red";
  _s.textContent = _f === 0
    ? `Exercise 1.4 — All ${_p} assertions passed!`
    : `${_f} assertion(s) failed, ${_p} passed.`;
  _r.appendChild(_s);
</script>
</body>
</html>
