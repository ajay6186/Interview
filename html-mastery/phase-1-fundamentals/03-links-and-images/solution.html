<!DOCTYPE html>
<!--
  ============================================================================
  Solution 1.3 — Links & Images
  ============================================================================
  Complete solution with all TODOs filled in correctly.
  ============================================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solution 1.3 — Links &amp; Images</title>
</head>
<body>

<h1>Links &amp; Images Exercise</h1>

<!-- Section 1: Basic Internal Link -->
<a href="#section-about">About Us</a>

<!-- Section 2: External Link with Security -->
<a href="https://www.example.com" target="_blank" rel="noopener noreferrer">Visit Example.com</a>

<!-- Section 3: Download Link -->
<a href="document.pdf" download>Download Report</a>

<!-- Section 4: Image with Alt Text -->
<img src="https://via.placeholder.com/400x300" alt="Placeholder image showing 400 by 300 pixels" width="400" height="300">

<!-- Section 5: Lazy-Loaded Image -->
<img src="https://via.placeholder.com/200x150" alt="A secondary placeholder image" loading="lazy">

<!-- Section 6: Decorative Image -->
<img src="https://via.placeholder.com/50x50" alt="">

<!-- Section 7: Named Anchor Target -->
<section id="section-about">
  <h2>About Us</h2>
  <p>This is the About Us section that the internal link navigates to.</p>
</section>

<!-- =========================================================
     Assertions (do not edit below)
     ========================================================= -->
<hr>
<div id="results"><h2 style="font-family:sans-serif">Solution 1.3 — Results</h2></div>
<script>
  const _r = document.getElementById("results");
  let _p = 0, _f = 0;
  function assert(cond, msg) {
    const el = document.createElement("p");
    el.style.cssText = "margin:4px 0;font-family:monospace;font-size:14px";
    if (cond) { el.style.color = "green"; el.textContent = "✓ " + msg; _p++; }
    else       { el.style.color = "red";   el.textContent = "✗ FAIL: " + msg; _f++; }
    _r.appendChild(el);
  }

  // 1. At least one anchor with href exists
  const allLinks = document.querySelectorAll("a[href]");
  assert(allLinks.length > 0, "At least one <a href> element exists");

  // 2. Internal link to #section-about exists
  const internalLink = document.querySelector('a[href="#section-about"]');
  assert(internalLink !== null, '<a href="#section-about"> internal link exists');

  // 3. External link with target="_blank" exists
  const externalLink = document.querySelector('a[target="_blank"]');
  assert(externalLink !== null, '<a target="_blank"> external link exists');

  // 4. External link has rel containing "noopener"
  const relAttr = externalLink ? (externalLink.getAttribute("rel") || "") : "";
  assert(relAttr.includes("noopener"), 'External link has rel containing "noopener"');

  // 5. Download link exists
  const downloadLink = document.querySelector("a[download]");
  assert(downloadLink !== null, '<a download> download link exists');

  // 6. img with non-empty alt exists
  const imgWithAlt = document.querySelector("img[alt]:not([alt=''])");
  assert(imgWithAlt !== null, "<img> with non-empty alt attribute exists");

  // 7. img with loading="lazy" exists
  const lazyImg = document.querySelector('img[loading="lazy"]');
  assert(lazyImg !== null, '<img loading="lazy"> exists');

  // 8. decorative img with alt="" exists
  const decorativeImg = document.querySelector("img[alt='']");
  assert(decorativeImg !== null, 'Decorative <img alt=""> with empty alt exists');

  // 9. element with id="section-about" exists
  const sectionAbout = document.getElementById("section-about");
  assert(sectionAbout !== null, 'Element with id="section-about" exists');

  // Summary
  const _s = document.createElement("p");
  _s.style.cssText = "margin-top:12px;font-weight:bold;font-family:sans-serif";
  _s.style.color = _f === 0 ? "green" : "red";
  _s.textContent = _f === 0
    ? `Solution 1.3 — All ${_p} assertions passed!`
    : `${_f} assertion(s) failed, ${_p} passed.`;
  _r.appendChild(_s);
</script>
</body>
</html>
