<hr>
<div id="results"><h2 style="font-family:sans-serif">Exercise 5.4 — Results</h2></div>
<script>
  const _r = document.getElementById("results");
  let _p = 0, _f = 0;
  function assert(cond, msg) {
    const el = document.createElement("p");
    el.style.cssText = "margin:4px 0;font-family:monospace;font-size:14px";
    if (cond) { el.style.color = "green"; el.textContent = "✓ " + msg; _p++; }
    else       { el.style.color = "red";   el.textContent = "✗ FAIL: " + msg; _f++; }
    _r.appendChild(el);
  }

  // Section 1: banner
  const pageHeader = document.getElementById("page-header");
  assert(pageHeader !== null, '#page-header exists');
  assert(pageHeader && pageHeader.getAttribute("role") === "banner", '#page-header has role="banner"');
  assert(pageHeader && pageHeader.querySelector("h1") !== null, '#page-header contains an <h1>');

  // Section 2: navigation
  const mainNav = document.getElementById("main-nav");
  assert(mainNav !== null, '#main-nav exists');
  assert(mainNav && mainNav.getAttribute("role") === "navigation", '#main-nav has role="navigation"');
  assert(mainNav && (mainNav.getAttribute("aria-label") || "").trim() !== "", '#main-nav has a non-empty aria-label');
  const navLinks = mainNav && mainNav.querySelectorAll("a");
  assert(navLinks && navLinks.length >= 3, 'Main nav contains at least 3 <a> links');

  // Section 3: search
  const searchForm = document.getElementById("search-form");
  assert(searchForm !== null, '#search-form exists');
  assert(searchForm && searchForm.getAttribute("role") === "search", '#search-form has role="search"');
  assert(searchForm && (searchForm.getAttribute("aria-label") || "").trim() !== "", '#search-form has a non-empty aria-label');

  // Section 4: main
  const mainContent = document.getElementById("main-content");
  assert(mainContent !== null, '#main-content exists');
  assert(mainContent && mainContent.getAttribute("role") === "main", '#main-content has role="main"');

  // Section 5: complementary
  const sidebar = document.getElementById("sidebar");
  assert(sidebar !== null, '#sidebar exists');
  assert(sidebar && sidebar.getAttribute("role") === "complementary", '#sidebar has role="complementary"');
  assert(sidebar && (sidebar.getAttribute("aria-label") || "").trim() !== "", '#sidebar has a non-empty aria-label');

  // Section 6: contentinfo
  const pageFooter = document.getElementById("page-footer");
  assert(pageFooter !== null, '#page-footer exists');
  assert(pageFooter && pageFooter.getAttribute("role") === "contentinfo", '#page-footer has role="contentinfo"');

  const _s = document.createElement("p");
  _s.style.cssText = "margin-top:12px;font-weight:bold;font-family:sans-serif";
  _s.style.color = _f === 0 ? "green" : "red";
  _s.textContent = _f === 0
    ? `Exercise 5.4 — All ${_p} assertions passed!`
    : `${_f} assertion(s) failed, ${_p} passed.`;
  _r.appendChild(_s);
</script>
