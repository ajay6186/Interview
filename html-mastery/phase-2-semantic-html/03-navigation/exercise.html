<!DOCTYPE html>
<!--
  ============================================================================
  Exercise 2.3 — Navigation
  ============================================================================
  Build a site navigation with main nav links plus a breadcrumb trail.
  Learn nav/ul/li/a patterns, aria-label for multiple navs, aria-current="page"
  for the current breadcrumb item, and pagination nav.

  Instructions: Fill in every <!-- TODO --> section so all assertions pass.
  Open in a browser — green = pass, red = fail.
  ============================================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 2.3 — Navigation</title>
  <style>
    body { font-family: sans-serif; margin: 0; }
    nav ul { list-style: none; padding: 0; margin: 0; display: flex; gap: 16px; }
    .site-header { background: #2c3e50; color: white; padding: 12px 16px; }
    .site-header a { color: white; text-decoration: none; }
    .breadcrumb { background: #f5f5f5; padding: 8px 16px; font-size: 14px; }
    .breadcrumb ol { gap: 4px; }
    .breadcrumb li::after { content: ' /'; color: #999; }
    .breadcrumb li:last-child::after { content: ''; }
    .pagination { padding: 16px; }
    .pagination a, .pagination span { padding: 6px 10px; border: 1px solid #ddd; margin: 0 2px; }
    [aria-current="page"] { font-weight: bold; color: #0066cc; }
  </style>
</head>
<body>

<!-- =========================================================
     Section 1: Main Navigation
     ========================================================= -->

<!-- TODO: Add a <header class="site-header"> containing a <nav aria-label="Main navigation">.
     The nav must contain a <ul> with 4 <li><a href="#"> links:
     "Home", "Products", "Blog", "Contact"
-->

<!-- =========================================================
     Section 2: Breadcrumb Navigation
     ========================================================= -->

<!-- TODO: Add a <nav class="breadcrumb" aria-label="Breadcrumb">.
     Inside it, add an <ol> with 3 items:
     1. <li><a href="#">Home</a></li>
     2. <li><a href="#">Products</a></li>
     3. <li><a href="#" aria-current="page">Widget Pro</a></li>
     The last item must have aria-current="page" on its link or span.
-->

<!-- =========================================================
     Section 3: Page Content (anchor target)
     ========================================================= -->

<main id="main-content">
  <h1>Widget Pro</h1>
  <p>This is the product detail page for Widget Pro.</p>
</main>

<!-- =========================================================
     Section 4: Pagination Navigation
     ========================================================= -->

<!-- TODO: Add a <nav aria-label="Pagination"> after main.
     Inside it, add links for pages 1, 2, 3 and a "Next" link.
     The current page link (page 1) should have aria-current="page".
-->

<!-- =========================================================
     Assertions (do not edit below)
     ========================================================= -->
<hr>
<div id="results"><h2 style="font-family:sans-serif">Exercise 2.3 — Results</h2></div>
<script>
  const _r = document.getElementById("results");
  let _p = 0, _f = 0;
  function assert(cond, msg) {
    const el = document.createElement("p");
    el.style.cssText = "margin:4px 0;font-family:monospace;font-size:14px";
    if (cond) { el.style.color = "green"; el.textContent = "✓ " + msg; _p++; }
    else       { el.style.color = "red";   el.textContent = "✗ FAIL: " + msg; _f++; }
    _r.appendChild(el);
  }

  // 1. At least 2 nav elements exist
  assert(document.querySelectorAll("nav").length >= 2, "At least 2 <nav> elements exist on the page");

  // 2. Main navigation with aria-label exists
  const mainNav = document.querySelector('nav[aria-label="Main navigation"]');
  assert(mainNav !== null, '<nav aria-label="Main navigation"> exists');

  // 3. Main nav contains ul with links
  assert(mainNav !== null && mainNav.querySelectorAll("a").length >= 3,
    "Main nav contains at least 3 links");

  // 4. Breadcrumb nav with aria-label exists
  const breadcrumb = document.querySelector('nav[aria-label="Breadcrumb"]');
  assert(breadcrumb !== null, '<nav aria-label="Breadcrumb"> exists');

  // 5. Breadcrumb uses ordered list
  assert(breadcrumb !== null && breadcrumb.querySelector("ol") !== null,
    "Breadcrumb nav uses an <ol> (ordered list)");

  // 6. aria-current="page" exists in the breadcrumb
  const currentItem = document.querySelector('nav[aria-label="Breadcrumb"] [aria-current="page"]');
  assert(currentItem !== null, 'aria-current="page" exists in the breadcrumb nav');

  // 7. Pagination nav exists
  const paginationNav = document.querySelector('nav[aria-label="Pagination"]');
  assert(paginationNav !== null, '<nav aria-label="Pagination"> exists');

  // 8. Pagination has aria-current="page" for current page
  const currentPage = paginationNav ? paginationNav.querySelector('[aria-current="page"]') : null;
  assert(currentPage !== null, 'aria-current="page" exists in the pagination nav');

  // Summary
  const _s = document.createElement("p");
  _s.style.cssText = "margin-top:12px;font-weight:bold;font-family:sans-serif";
  _s.style.color = _f === 0 ? "green" : "red";
  _s.textContent = _f === 0
    ? `Exercise 2.3 — All ${_p} assertions passed!`
    : `${_f} assertion(s) failed, ${_p} passed.`;
  _r.appendChild(_s);
</script>
</body>
</html>
