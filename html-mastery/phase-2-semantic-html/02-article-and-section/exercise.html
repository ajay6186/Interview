<!-- =========================================================

<hr>
<div id="results"><h2 style="font-family:sans-serif">Exercise 2.2 — Results</h2></div>
<script>
  const _r = document.getElementById("results");
  let _p = 0, _f = 0;
  function assert(cond, msg) {
    const el = document.createElement("p");
    el.style.cssText = "margin:4px 0;font-family:monospace;font-size:14px";
    if (cond) { el.style.color = "green"; el.textContent = "✓ " + msg; _p++; }
    else       { el.style.color = "red";   el.textContent = "✗ FAIL: " + msg; _f++; }
    _r.appendChild(el);
  }

  // 1. section exists
  assert(document.querySelector("section") !== null, "<section> element exists");

  // 2. section with aria-labelledby exists
  assert(document.querySelector("section[aria-labelledby]") !== null,
    '<section aria-labelledby="..."> exists');

  // 3. at least 3 articles exist
  assert(document.querySelectorAll("article").length >= 3,
    "At least 3 <article> elements exist on the page");

  // 4. articles have headings
  const articles = document.querySelectorAll("article");
  let articlesHaveHeadings = Array.from(articles).every(a =>
    a.querySelector("h1, h2, h3, h4, h5, h6") !== null
  );
  assert(articlesHaveHeadings, "Every <article> contains a heading element");

  // 5. time with datetime exists inside an article
  assert(document.querySelector("article time[datetime]") !== null,
    "<time datetime> exists inside an <article>");

  // 6. article header exists
  assert(document.querySelector("article header") !== null,
    "<header> exists inside an <article>");

  // 7. article footer exists
  assert(document.querySelector("article footer") !== null,
    "<footer> exists inside an <article>");

  // 8. address element exists
  assert(document.querySelector("address") !== null, "<address> element exists");

  // Summary
  const _s = document.createElement("p");
  _s.style.cssText = "margin-top:12px;font-weight:bold;font-family:sans-serif";
  _s.style.color = _f === 0 ? "green" : "red";
  _s.textContent = _f === 0
    ? `Exercise 2.2 — All ${_p} assertions passed!`
    : `${_f} assertion(s) failed, ${_p} passed.`;
  _r.appendChild(_s);
</script>
</body>
</html>
