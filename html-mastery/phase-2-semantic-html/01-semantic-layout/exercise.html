<hr>
<div id="results"><h2 style="font-family:sans-serif">Exercise 2.1 — Results</h2></div>
<script>
  const _r = document.getElementById("results");
  let _p = 0, _f = 0;
  function assert(cond, msg) {
    const el = document.createElement("p");
    el.style.cssText = "margin:4px 0;font-family:monospace;font-size:14px";
    if (cond) { el.style.color = "green"; el.textContent = "✓ " + msg; _p++; }
    else       { el.style.color = "red";   el.textContent = "✗ FAIL: " + msg; _f++; }
    _r.appendChild(el);
  }

  // 1. header exists
  assert(document.querySelector("header") !== null, "<header> element exists");

  // 2. header contains h1
  assert(document.querySelector("header h1") !== null, "<h1> exists inside <header>");

  // 3. nav exists
  assert(document.querySelector("nav") !== null, "<nav> element exists");

  // 4. nav has aria-label
  const navEl = document.querySelector("nav[aria-label]");
  assert(navEl !== null, '<nav aria-label="..."> has an aria-label attribute');

  // 5. nav contains links
  assert(document.querySelectorAll("nav a").length >= 2, "<nav> contains at least 2 links");

  // 6. main exists
  assert(document.querySelector("main") !== null, "<main> element exists");

  // 7. only one main on the page
  assert(document.querySelectorAll("main").length === 1, "Only one <main> element on the page");

  // 8. aside exists
  assert(document.querySelector("aside") !== null, "<aside> element exists");

  // 9. footer exists
  assert(document.querySelector("footer") !== null, "<footer> element exists");

  // 10. main contains an h2
  assert(document.querySelector("main h2") !== null, "<h2> exists inside <main>");

  // Summary
  const _s = document.createElement("p");
  _s.style.cssText = "margin-top:12px;font-weight:bold;font-family:sans-serif";
  _s.style.color = _f === 0 ? "green" : "red";
  _s.textContent = _f === 0
    ? `Exercise 2.1 — All ${_p} assertions passed!`
    : `${_f} assertion(s) failed, ${_p} passed.`;
  _r.appendChild(_s);
</script>
