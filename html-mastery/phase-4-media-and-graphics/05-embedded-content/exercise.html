</head>

<!-- =========================================================

<hr>
<div id="results"><h2 style="font-family:sans-serif">Exercise 4.5 — Results</h2></div>
<script>
  const _r = document.getElementById("results");
  let _p = 0, _f = 0;
  function assert(cond, msg) {
    const el = document.createElement("p");
    el.style.cssText = "margin:4px 0;font-family:monospace;font-size:14px";
    if (cond) { el.style.color = "green"; el.textContent = "✓ " + msg; _p++; }
    else       { el.style.color = "red";   el.textContent = "✗ FAIL: " + msg; _f++; }
    _r.appendChild(el);
  }

  // Section 1: basic iframe
  const mainIframe = document.getElementById("main-iframe");
  assert(mainIframe !== null, '#main-iframe exists');
  assert(mainIframe && mainIframe.tagName.toLowerCase() === "iframe", '#main-iframe is an <iframe> element');
  assert(mainIframe && (mainIframe.getAttribute("src") || "").trim() !== "", '#main-iframe has a src attribute');
  assert(mainIframe && mainIframe.getAttribute("width") === "600", '#main-iframe has width="600"');
  assert(mainIframe && mainIframe.getAttribute("height") === "400", '#main-iframe has height="400"');
  assert(mainIframe && (mainIframe.getAttribute("title") || "").trim() !== "", '#main-iframe has a non-empty title attribute');

  // Section 2: sandboxed iframe
  const sandboxed = document.getElementById("sandboxed-iframe");
  assert(sandboxed !== null, '#sandboxed-iframe exists');
  assert(sandboxed && sandboxed.hasAttribute("sandbox"), '#sandboxed-iframe has a sandbox attribute');
  assert(sandboxed && (sandboxed.getAttribute("sandbox") || "").includes("allow-scripts"), 'sandbox includes "allow-scripts"');
  assert(sandboxed && (sandboxed.getAttribute("sandbox") || "").includes("allow-same-origin"), 'sandbox includes "allow-same-origin"');
  assert(sandboxed && (sandboxed.getAttribute("title") || "").trim() !== "", '#sandboxed-iframe has a non-empty title');

  // Section 3: lazy iframe
  const lazyIframe = document.getElementById("lazy-iframe");
  assert(lazyIframe !== null, '#lazy-iframe exists');
  assert(lazyIframe && lazyIframe.getAttribute("loading") === "lazy", '#lazy-iframe has loading="lazy"');
  assert(lazyIframe && (lazyIframe.getAttribute("title") || "").trim() !== "", '#lazy-iframe has a non-empty title');

  const _s = document.createElement("p");
  _s.style.cssText = "margin-top:12px;font-weight:bold;font-family:sans-serif";
  _s.style.color = _f === 0 ? "green" : "red";
  _s.textContent = _f === 0
    ? `Exercise 4.5 — All ${_p} assertions passed!`
    : `${_f} assertion(s) failed, ${_p} passed.`;
  _r.appendChild(_s);
</script>
</body>
</html>
