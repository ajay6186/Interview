apiVersion: v1
kind: Pod
metadata:
  name: workload-identity-test
  namespace: app-9999-default
spec:
  serviceAccountName: sv-9999-ksa-com1-0000
  containers:
  - name: main
    image: google/cloud-sdk:slim
    command: ["sleep", "3600"]
    # On GKE this pod would authenticate to GCP APIs as the GSA automatically.
    # Locally (kind) this pod simply runs with the KSA token — no GCP exchange.
