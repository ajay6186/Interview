apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: app-9999-default

resources:
- deployment.yaml

configMapGenerator:
- name: hello-world-config-map
  files:
  - conf/hello-world.sh

secretGenerator:
- name: hello-world-secret
  literals:
  - FIRSTNAME=John
  - LASTNAME=Doe
  type: Opaque
  options:
    disableNameSuffixHash: true
