input {
  tcp {
    port  => 5000
    codec => json_lines
  }
}

filter {
  # Ensure @timestamp comes from the app, fallback to now
  if [timestamp] {
    date {
      match   => ["timestamp", "ISO8601"]
      target  => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Promote log level to a tag for easier filtering
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  }

  # Tag errors so alerts can target them
  if [level] == "ERROR" {
    mutate { add_tag => ["error"] }
  }

  if [level] == "WARNING" {
    mutate { add_tag => ["warning"] }
  }

  # Remove noisy fields added by Logstash itself
  mutate {
    remove_field => ["@version", "host", "port"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "microservices-logs-%{+YYYY.MM.dd}"
  }

  # Mirror to stdout so `docker logs logstash` is useful during dev
  stdout {
    codec => rubydebug
  }
}
