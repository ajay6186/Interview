events { worker_connections 1024; }

http {
  # ── Security headers applied to all responses ──────────────────────────────
  add_header X-Frame-Options           "DENY"            always;
  add_header X-Content-Type-Options    "nosniff"         always;
  add_header X-XSS-Protection          "1; mode=block"   always;
  add_header Referrer-Policy           "no-referrer"     always;
  add_header Strict-Transport-Security "max-age=31536000" always;

  # ── Rate limiting ──────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;   # stricter for auth

  # ── Upstream service pool ──────────────────────────────────────────────────
  upstream user_service    { server user-service:3001;    }
  upstream auth_service    { server auth-service:3002;    }
  upstream order_service   { server order-service:3003;   }
  upstream payment_service { server payment-service:3004; }

  server {
    listen 80;
    server_name _;

    # Hide server version
    server_tokens off;

    # ── Auth routes (stricter rate limit) ────────────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://auth_service/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── User routes ───────────────────────────────────────────────────────────
    location /api/users/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://user_service/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Order routes ──────────────────────────────────────────────────────────
    location /api/orders/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://order_service/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Payment routes ────────────────────────────────────────────────────────
    location /api/payments/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass         http://payment_service/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Stripe webhook (raw body needed for signature check) ─────────────────
    location /api/payments/webhook {
      proxy_pass         http://payment_service/webhook;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      # Do NOT buffer — Stripe needs raw body
      proxy_request_buffering off;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
      return 200 'OK';
      add_header Content-Type text/plain;
    }
  }
}
