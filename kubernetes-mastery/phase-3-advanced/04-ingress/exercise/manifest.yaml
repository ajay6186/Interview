  rules:
    - http:
        paths:
          # TODO: Route /api/ to api-service port 80 (pathType: Prefix)
          - path: /api/
            pathType: ???
            backend:
              service:
                name: ???
                port:
                  number: ???
          # TODO: Route / to frontend-service port 80
          - path: /
