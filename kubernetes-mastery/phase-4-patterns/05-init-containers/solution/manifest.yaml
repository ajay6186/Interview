# ============================================================================
# Solution 4.5 — Init Containers
# ============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: init-demo
spec:
  initContainers:
    # Runs first — polls until db-service is accepting TCP connections on 5432
    - name: wait-for-db
      image: busybox
      command: ["sh", "-c", "until nc -z db-service 5432; do echo 'waiting for db...'; sleep 2; done; echo 'db is ready!'"]

    # Runs second (after wait-for-db completes) — simulates running migrations
    # - name: run-migrations
    #   image: my-migrator:latest
    #   command: ["./migrate.sh"]

  containers:
    - name: app
      image: nginx:alpine
      ports:
        - containerPort: 80
      # This container starts ONLY after ALL init containers succeed

---
apiVersion: v1
kind: Service
metadata:
  name: db-service
spec:
  selector:
    app: db-service
  ports:
    - port: 5432
---
apiVersion: v1
kind: Pod
metadata:
  name: db-service
  labels:
    app: db-service
spec:
  containers:
    - name: postgres
      image: postgres:15-alpine
      env:
        - name: POSTGRES_PASSWORD
          value: "test"
      ports:
        - containerPort: 5432

# LIFECYCLE:
# 1. wait-for-db init container runs → polls db-service:5432
# 2. db-service pod starts and becomes ready
# 3. wait-for-db succeeds (nc -z returns 0)
# 4. app container starts
