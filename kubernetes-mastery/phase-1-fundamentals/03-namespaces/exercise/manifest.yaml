apiVersion: v1
kind: Namespace
metadata:
  name: ???

---
apiVersion: v1
kind: Pod
metadata:
  name: staging-app
  # TODO: Place this pod in the "staging" namespace
  # namespace: staging
  namespace: ???
  labels:
    app: staging-app

spec:
  containers:
    - name: app
      image: nginx:alpine
      ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: staging-service
  # TODO: Also place this service in the "staging" namespace
  namespace: ???
spec:
  selector:
    app: staging-app
  ports:
    - port: 80
      targetPort: 80
