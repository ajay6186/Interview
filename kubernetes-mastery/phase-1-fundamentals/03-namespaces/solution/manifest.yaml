# ============================================================================
# Solution 1.3 — Namespaces
# ============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: staging

---
apiVersion: v1
kind: Pod
metadata:
  name: staging-app
  namespace: staging    # This pod lives in the staging namespace
  labels:
    app: staging-app

spec:
  containers:
    - name: app
      image: nginx:alpine
      ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: staging-service
  namespace: staging    # Must be in same namespace as its pods
spec:
  selector:
    app: staging-app
  ports:
    - port: 80
      targetPort: 80

# DNS resolution:
# Within staging namespace:     http://staging-service
# From another namespace:       http://staging-service.staging.svc.cluster.local
