# ============================================================================
# Solution 1.5 — Services
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80

---
# ClusterIP: stable cluster-internal IP + DNS name
# DNS: nginx-clusterip.default.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: nginx-clusterip
spec:
  type: ClusterIP    # Default — omitting type also gives ClusterIP
  selector:
    app: nginx       # Routes to all pods matching this label
  ports:
    - port: 80
      targetPort: 80

---
# NodePort: opens port 30080 on every cluster node
# Access: http://<any-node-ip>:30080
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080   # Fixed node port (30000–32767)
