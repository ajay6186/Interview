# A PersistentVolume is a cluster-wide storage resource
apiVersion: v1
kind: PersistentVolume
metadata:
  name: my-pv
spec:
  # TODO: Set storage capacity to "1Gi"
  capacity:
    storage: ???
  # TODO: Set accessModes to ReadWriteOnce (one node can read/write)
  accessModes:
    - ???
  # TODO: Set reclaimPolicy to Retain (keep data when PVC is deleted)
  persistentVolumeReclaimPolicy: ???
  # Using hostPath for local development (not for production)
  hostPath:
    path: /tmp/my-pv-data

---
# A PersistentVolumeClaim is a request for storage by a pod
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: my-pvc
spec:
  # TODO: Set accessModes to ReadWriteOnce (must match PV)
  accessModes:
    - ???
  resources:
    requests:
      # TODO: Request 500Mi of storage
      storage: ???

