apiVersion: v1
kind: Pod
metadata:
  name: pv-pod
spec:
  containers:
    - name: app
      image: busybox
      command: ["sh", "-c", "echo 'Data persists!' > /data/info.txt && sleep 3600"]
      volumeMounts:
        # TODO: Mount the PVC at /data
        - name: storage
          mountPath: ???
  volumes:
    # TODO: Reference the PVC
    - name: storage
      persistentVolumeClaim:
        claimName: ???
