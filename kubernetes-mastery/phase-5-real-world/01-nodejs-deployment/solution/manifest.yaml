# ============================================================================
# Solution 5.1 — Node.js Deployment Stack
# ============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: node-api-config
data:
  NODE_ENV: production
  LOG_LEVEL: info

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-api
  labels:
    app: node-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: node-api
  template:
    metadata:
      labels:
        app: node-api
    spec:
      containers:
        - name: api
          image: node:18-alpine
          command: ["node", "-e", "require('http').createServer((req,res)=>{if(req.url==='/health')return res.end('ok');res.end('API: '+process.env.NODE_ENV)}).listen(3000)"]
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: node-api-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: node-api-service
spec:
  selector:
    app: node-api
  ports:
    - port: 80
      targetPort: 3000
