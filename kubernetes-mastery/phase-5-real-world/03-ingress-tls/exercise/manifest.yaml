# ============================================================================
# Exercise 5.3 — Ingress with TLS
# NOTE: Create the TLS secret BEFORE applying this file (see README.md)
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
spec:
  selector:
    app: myapp
  ports:
    - port: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress
  annotations:
    # TODO: Add annotation to redirect HTTP to HTTPS
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    ???: ???
spec:
  ingressClassName: nginx
  # TODO: Add TLS configuration
  # tls:
  #   - hosts:
  #       - myapp.example.com
  #     secretName: myapp-tls   # Must exist before applying
  tls: []

  rules:
    # TODO: Add a host rule for myapp.example.com routing to myapp-service port 80
    - host: ???
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ???
                port:
                  number: 80
