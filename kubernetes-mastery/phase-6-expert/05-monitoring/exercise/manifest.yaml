# ============================================================================
# Exercise 6.5 — Monitoring with Prometheus Annotations
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metrics-app
  template:
    metadata:
      labels:
        app: metrics-app
      annotations:
        # TODO: Add Prometheus scraping annotations
        # prometheus.io/scrape: "true"
        # prometheus.io/port: "3000"
        # prometheus.io/path: "/metrics"
        ???: ???
        ???: ???
        ???: ???
    spec:
      containers:
        - name: app
          image: node:18-alpine
          command:
            - node
            - -e
            - |
              const http = require('http');
              let requests = 0;
              http.createServer((req, res) => {
                requests++;
                if (req.url === '/metrics') {
                  res.end('# HELP http_requests_total\nhttp_requests_total ' + requests + '\n');
                } else {
                  res.end('App running. Visit /metrics\n');
                }
              }).listen(3000);
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
