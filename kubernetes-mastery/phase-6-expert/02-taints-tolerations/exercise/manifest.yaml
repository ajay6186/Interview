# ============================================================================
# Exercise 6.2 — Taints and Tolerations
# Taint a node first: kubectl taint node <node> dedicated=gpu:NoSchedule
# ============================================================================

# Regular pod — no toleration, cannot schedule on tainted node
apiVersion: v1
kind: Pod
metadata:
  name: regular-pod
spec:
  containers:
    - name: app
      image: nginx:alpine

---
# GPU pod — has toleration, CAN schedule on tainted node
apiVersion: v1
kind: Pod
metadata:
  name: gpu-pod
spec:
  # TODO: Add a toleration for the taint: dedicated=gpu:NoSchedule
  # tolerations:
  #   - key: "dedicated"
  #     operator: "Equal"
  #     value: "gpu"
  #     effect: "NoSchedule"

  containers:
    - name: gpu-app
      image: nvidia/cuda:11.8.0-base-ubuntu22.04
      command: ["sh", "-c", "echo GPU workload running; sleep 3600"]
      resources:
        limits:
          # In a real cluster with GPU nodes:
          # nvidia.com/gpu: 1
          memory: "512Mi"
